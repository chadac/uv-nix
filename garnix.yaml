# Garnix CI configuration
# https://garnix.io/docs/yaml_config

builds:
  # Only include specific packages for CI builds
  include:
    - "packages.x86_64-linux.default"
    - "packages.x86_64-linux.build-0-10-9"
    - "packages.aarch64-darwin.default"
    - "packages.aarch64-darwin.build-0-10-9"
    - "devShells.x86_64-linux.default"
    - "devShells.aarch64-darwin.default"

  # Exclude older versions from CI to save build time
  exclude:
    - "packages.*.build-0-10-7"
    - "packages.*.build-0-10-8"
    - "packages.*.bin-*"

# Only run on main branch pushes, not PRs
# Garnix runs on PRs by default, so we need to explicitly disable
pullRequestsEnabled: false
