name: Publish Artifacts

on:
  # Trigger after Garnix builds complete (via check_suite)
  check_suite:
    types: [completed]
  # Manual trigger
  workflow_dispatch:
  # Also trigger on tags for releases
  push:
    tags:
      - 'v*'

# Explicitly exclude PRs - only run on main branch
# PRs will not trigger this workflow

jobs:
  # Wait for Garnix to complete before publishing
  wait-for-garnix:
    # Only run on main branch or tags, and only if check_suite is from Garnix
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'check_suite' && 
       github.event.check_suite.app.slug == 'garnix-ci' &&
       github.event.check_suite.conclusion == 'success' &&
       github.event.check_suite.head_branch == 'main')
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
    steps:
      - name: Check if we should publish
        id: check
        run: |
          echo "should_publish=true" >> $GITHUB_OUTPUT
          echo "Garnix build completed successfully, proceeding to publish artifacts"

  # Fetch artifacts from Garnix cache and publish
  publish-linux:
    needs: wait-for-garnix
    if: needs.wait-for-garnix.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version:
          - "0.10.9"
          - "0.10.8"
          - "0.10.7"
          - "0.10.6"
          - "0.10.5"
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/determinate-nix-action@v3

      - name: Fetch build-${{ matrix.version }} from cache
        id: fetch
        run: |
          VERSION_ATTR=$(echo "${{ matrix.version }}" | tr '.' '-')
          echo "Building/fetching packages.x86_64-linux.build-${VERSION_ATTR}"
          nix build .#build-${VERSION_ATTR} --out-link result -L \
            --extra-substituters "https://cache.garnix.io" \
            --extra-trusted-public-keys "cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g="
          
          # Extract version from binary
          ACTUAL_VERSION=$(./result/bin/uv --version | awk '{print $2}')
          echo "version=$ACTUAL_VERSION" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uv-nix-${{ steps.fetch.outputs.version }}-linux-x86_64
          path: result/bin/uv
          retention-days: 90

  # Fetch aarch64-linux artifacts from Garnix cache
  publish-linux-arm:
    needs: wait-for-garnix
    if: needs.wait-for-garnix.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version:
          - "0.10.9"
          - "0.10.8"
          - "0.10.7"
          - "0.10.6"
          - "0.10.5"
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/determinate-nix-action@v3

      - name: Fetch build-${{ matrix.version }} from cache
        id: fetch
        run: |
          VERSION_ATTR=$(echo "${{ matrix.version }}" | tr '.' '-')
          echo "Building/fetching packages.aarch64-linux.build-${VERSION_ATTR}"
          nix build .#packages.aarch64-linux.build-${VERSION_ATTR} --out-link result -L \
            --extra-substituters "https://cache.garnix.io" \
            --extra-trusted-public-keys "cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g="
          
          # Extract version from binary (can't run ARM binary on x86, so use the version matrix)
          echo "version=${{ matrix.version }}-nix" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uv-nix-${{ steps.fetch.outputs.version }}-linux-aarch64
          path: result/bin/uv
          retention-days: 90

  publish-macos:
    needs: wait-for-garnix
    if: needs.wait-for-garnix.outputs.should_publish == 'true'
    runs-on: macos-latest
    strategy:
      matrix:
        version:
          - "0.10.9"
          - "0.10.8"
          - "0.10.7"
          - "0.10.6"
          - "0.10.5"
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/determinate-nix-action@v3

      - name: Fetch build-${{ matrix.version }} from cache
        id: fetch
        run: |
          VERSION_ATTR=$(echo "${{ matrix.version }}" | tr '.' '-')
          echo "Building/fetching packages.aarch64-darwin.build-${VERSION_ATTR}"
          nix build .#build-${VERSION_ATTR} --out-link result -L \
            --extra-substituters "https://cache.garnix.io" \
            --extra-trusted-public-keys "cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g="
          
          # Extract version from binary
          ACTUAL_VERSION=$(./result/bin/uv --version | awk '{print $2}')
          echo "version=$ACTUAL_VERSION" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uv-nix-${{ steps.fetch.outputs.version }}-darwin-arm64
          path: result/bin/uv
          retention-days: 90

  # Create a release when triggered by a tag
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [publish-linux, publish-linux-arm, publish-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            cp "$dir/uv" "release/$name"
          done
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
