name: Publish Artifacts

on:
  # Trigger after Garnix builds complete (via check_suite)
  check_suite:
    types: [completed]
  # Manual trigger
  workflow_dispatch:
  # Also trigger on tags for releases
  push:
    tags:
      - 'v*'

jobs:
  # Wait for Garnix to complete before publishing
  wait-for-garnix:
    # Only run on main branch or tags, and only if check_suite is from Garnix
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'check_suite' &&
       github.event.check_suite.app.slug == 'garnix-ci' &&
       github.event.check_suite.conclusion == 'success' &&
       github.event.check_suite.head_branch == 'main')
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
    steps:
      - name: Check if we should publish
        id: check
        run: |
          echo "should_publish=true" >> $GITHUB_OUTPUT
          echo "Garnix build completed successfully, proceeding to publish artifacts"

  # Build and publish x86_64-linux artifact
  publish-linux:
    needs: wait-for-garnix
    if: needs.wait-for-garnix.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - name: Fetch from Garnix cache
        id: fetch
        run: |
          nix build .#default --out-link result -L \
            --extra-substituters "https://cache.garnix.io" \
            --extra-trusted-public-keys "cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g="
          ACTUAL_VERSION=$(./result/bin/uv --version | awk '{print $2}')
          echo "version=$ACTUAL_VERSION" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: uv-nix-${{ steps.fetch.outputs.version }}-linux-x86_64
          path: result/bin/uv
          retention-days: 90

  # Build and publish aarch64-linux artifact
  publish-linux-arm:
    needs: wait-for-garnix
    if: needs.wait-for-garnix.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - name: Fetch from Garnix cache
        id: fetch
        run: |
          nix build .#packages.aarch64-linux.default --out-link result -L \
            --extra-substituters "https://cache.garnix.io" \
            --extra-trusted-public-keys "cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g="
          # Read version from data/uv.json (can't run ARM binary on x86)
          UV_VERSION=$(jq -r .version data/uv.json)
          echo "version=${UV_VERSION}-nix" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: uv-nix-${{ steps.fetch.outputs.version }}-linux-aarch64
          path: result/bin/uv
          retention-days: 90

  # Build and publish aarch64-darwin artifact
  publish-macos:
    needs: wait-for-garnix
    if: needs.wait-for-garnix.outputs.should_publish == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - name: Fetch from Garnix cache
        id: fetch
        run: |
          nix build .#default --out-link result -L \
            --extra-substituters "https://cache.garnix.io" \
            --extra-trusted-public-keys "cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g="
          ACTUAL_VERSION=$(./result/bin/uv --version | awk '{print $2}')
          echo "version=$ACTUAL_VERSION" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: uv-nix-${{ steps.fetch.outputs.version }}-darwin-arm64
          path: result/bin/uv
          retention-days: 90

  # Create a release when triggered by a tag
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [publish-linux, publish-linux-arm, publish-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            cp "$dir/uv" "release/$name"
          done
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*
          generate_release_notes: true
