name: Publish Artifacts

on:
  push:
    branches: [main]
    paths:
      - 'data/uv.json'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            artifact-suffix: linux-x86_64
          - runner: ubuntu-24.04-arm
            artifact-suffix: linux-aarch64
          - runner: macos-latest
            artifact-suffix: darwin-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v15
        with:
          name: uv-nix

      - name: Build uv
        id: build
        run: |
          nix build .#default --out-link result -L
          ACTUAL_VERSION=$(./result/bin/uv --version | awk '{print $2}')
          echo "version=$ACTUAL_VERSION" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uv-nix-${{ steps.build.outputs.version }}-${{ matrix.artifact-suffix }}
          path: result/bin/uv
          retention-days: 90

  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Get version
        id: version
        run: |
          VERSION=$(jq -r .version data/uv.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Check if tag exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            cp "$dir/uv" "release/$name"
          done
          ls -la release/

      - name: Create tag and release
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag "$VERSION"
          git push origin "$VERSION"
        env:
          GH_TOKEN: ${{ secrets.UV_NIX_PAT }}

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: release/*
          generate_release_notes: true
