name: Release

on:
  push:
    branches: [main]
    paths:
      - 'data/uv.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            artifact-suffix: linux-x86_64
          - runner: ubuntu-24.04-arm
            artifact-suffix: linux-aarch64
          - runner: macos-latest
            artifact-suffix: darwin-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v15
        with:
          name: uv-nix

      - name: Build uv
        id: build
        run: |
          nix build .#default --out-link result -L
          ACTUAL_VERSION=$(./result/bin/uv --version | awk '{print $2}')
          echo "version=$ACTUAL_VERSION" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uv-nix-${{ steps.build.outputs.version }}-${{ matrix.artifact-suffix }}
          path: result/bin/uv
          retention-days: 90

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.UV_NIX_PAT }}

      - uses: cachix/install-nix-action@v31

      - name: Get version and determine tag
        id: version
        run: |
          VERSION=$(jq -r .version data/uv.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets and compute hashes
        id: assets
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          mkdir -p release
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            cp "$dir/uv" "release/$name"
          done
          ls -la release/

          hash_asset() {
            local file="$1"
            if [ -f "$file" ]; then
              nix hash file --sri "$file"
            fi
          }

          LINUX_X86="uv-nix-${VERSION}-linux-x86_64"
          LINUX_ARM="uv-nix-${VERSION}-linux-aarch64"
          DARWIN_ARM="uv-nix-${VERSION}-darwin-arm64"

          echo "linux_x86_name=$LINUX_X86" >> $GITHUB_OUTPUT
          echo "linux_x86_hash=$(hash_asset "release/$LINUX_X86")" >> $GITHUB_OUTPUT
          echo "linux_arm_name=$LINUX_ARM" >> $GITHUB_OUTPUT
          echo "linux_arm_hash=$(hash_asset "release/$LINUX_ARM")" >> $GITHUB_OUTPUT
          echo "darwin_arm_name=$DARWIN_ARM" >> $GITHUB_OUTPUT
          echo "darwin_arm_hash=$(hash_asset "release/$DARWIN_ARM")" >> $GITHUB_OUTPUT

      - name: Create tag and GitHub release
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG" || true
          git push origin "$TAG" || true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: release/*
          generate_release_notes: true

      - name: Update bin branch
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          RELEASE_BASE="https://github.com/chadac/uv-nix/releases/download/${TAG}"

          LINUX_X86_HASH="${{ steps.assets.outputs.linux_x86_hash }}"
          LINUX_ARM_HASH="${{ steps.assets.outputs.linux_arm_hash }}"
          DARWIN_ARM_HASH="${{ steps.assets.outputs.darwin_arm_hash }}"

          LINUX_X86_NAME="${{ steps.assets.outputs.linux_x86_name }}"
          LINUX_ARM_NAME="${{ steps.assets.outputs.linux_arm_name }}"
          DARWIN_ARM_NAME="${{ steps.assets.outputs.darwin_arm_name }}"

          # Clone just the bin branch into a temp dir
          WORK=$(mktemp -d)
          git clone --single-branch --branch bin \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" \
            "$WORK"
          cd "$WORK"

          # Generate release file
          mkdir -p releases
          cat > "releases/${TAG}.nix" <<EOF
          # Auto-generated by release workflow. Do not edit.
          {
            version = "${VERSION}-nix";
            tag = "${TAG}";
            assets = {
          EOF

          [ -n "$LINUX_X86_HASH" ] && cat >> "releases/${TAG}.nix" <<EOF
              "x86_64-linux" = {
                url = "${RELEASE_BASE}/${LINUX_X86_NAME}";
                hash = "${LINUX_X86_HASH}";
              };
          EOF

          [ -n "$LINUX_ARM_HASH" ] && cat >> "releases/${TAG}.nix" <<EOF
              "aarch64-linux" = {
                url = "${RELEASE_BASE}/${LINUX_ARM_NAME}";
                hash = "${LINUX_ARM_HASH}";
              };
          EOF

          [ -n "$DARWIN_ARM_HASH" ] && cat >> "releases/${TAG}.nix" <<EOF
              "aarch64-darwin" = {
                url = "${RELEASE_BASE}/${DARWIN_ARM_NAME}";
                hash = "${DARWIN_ARM_HASH}";
              };
          EOF

          cat >> "releases/${TAG}.nix" <<EOF
            };
          }
          EOF

          # Update default.nix to point to the new release
          sed -i "s|release ? ./releases/.*\.nix|release ? ./releases/${TAG}.nix|" default.nix

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add releases/ default.nix
          git commit -m "release: ${TAG}"
          git push origin bin
        env:
          GH_TOKEN: ${{ secrets.UV_NIX_PAT }}
