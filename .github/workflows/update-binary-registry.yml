name: Update binary registry

on:
  # Trigger after a release is published
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to register (e.g., 0.11.17)'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - name: Determine release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          # Extract uv version from tag (e.g., v0.11.16-nix.1 -> 0.11.16)
          VERSION=$(echo "$TAG" | sed 's/^v//; s/-nix\..*//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG, uv version: $VERSION"

      - name: Fetch artifact hashes
        id: hashes
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          VERSION="${{ steps.release.outputs.version }}"
          RELEASE_BASE="https://github.com/chadac/uv-nix/releases/download"

          # Define expected artifact names
          LINUX_X86="uv-nix-${VERSION}-nix-linux-x86_64"
          LINUX_ARM="uv-nix-${VERSION}-nix-linux-aarch64"
          DARWIN_ARM="uv-nix-${VERSION}-nix-darwin-arm64"

          echo "Fetching hashes for release $TAG..."

          fetch_hash() {
            local name="$1"
            local url="${RELEASE_BASE}/${TAG}/${name}"
            echo "  Fetching $url..." >&2
            local hash
            hash=$(nix-prefetch-url "$url" 2>/dev/null) || return 1
            nix hash to-sri --type sha256 "$hash"
          }

          HASH_LINUX_X86=$(fetch_hash "$LINUX_X86") || HASH_LINUX_X86=""
          HASH_LINUX_ARM=$(fetch_hash "$LINUX_ARM") || HASH_LINUX_ARM=""
          HASH_DARWIN_ARM=$(fetch_hash "$DARWIN_ARM") || HASH_DARWIN_ARM=""

          # Check we got at least one hash
          if [ -z "$HASH_LINUX_X86" ] && [ -z "$HASH_LINUX_ARM" ] && [ -z "$HASH_DARWIN_ARM" ]; then
            echo "::error::No artifacts found for release $TAG"
            exit 1
          fi

          echo "Hashes:"
          echo "  x86_64-linux: $HASH_LINUX_X86"
          echo "  aarch64-linux: $HASH_LINUX_ARM"
          echo "  aarch64-darwin: $HASH_DARWIN_ARM"

          echo "linux_x86_name=$LINUX_X86" >> $GITHUB_OUTPUT
          echo "linux_x86_hash=$HASH_LINUX_X86" >> $GITHUB_OUTPUT
          echo "linux_arm_name=$LINUX_ARM" >> $GITHUB_OUTPUT
          echo "linux_arm_hash=$HASH_LINUX_ARM" >> $GITHUB_OUTPUT
          echo "darwin_arm_name=$DARWIN_ARM" >> $GITHUB_OUTPUT
          echo "darwin_arm_hash=$HASH_DARWIN_ARM" >> $GITHUB_OUTPUT

      - name: Update data/bin.json
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          VERSION="${{ steps.release.outputs.version }}"

          python3 -c "
          import json, sys

          data = {
              'version': '$VERSION',
              'releaseTag': '$TAG',
              'assets': {}
          }

          assets = [
              ('x86_64-linux', '${{ steps.hashes.outputs.linux_x86_name }}', '${{ steps.hashes.outputs.linux_x86_hash }}'),
              ('aarch64-linux', '${{ steps.hashes.outputs.linux_arm_name }}', '${{ steps.hashes.outputs.linux_arm_hash }}'),
              ('aarch64-darwin', '${{ steps.hashes.outputs.darwin_arm_name }}', '${{ steps.hashes.outputs.darwin_arm_hash }}'),
          ]

          for system, name, hash in assets:
              if hash:
                  data['assets'][system] = {'name': name, 'hash': hash}

          with open('data/bin.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')

          print(json.dumps(data, indent=2))
          "

      - name: Create PR
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          TAG="${{ steps.release.outputs.tag }}"
          BRANCH="auto/update-binary-${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add data/bin.json
          git commit -m "feat: update pre-built binary to ${VERSION}"
          git push origin "$BRANCH"

          gh pr create \
            --title "feat: update pre-built binary to ${VERSION}" \
            --body "$(cat <<EOF
          ## Summary

          Updates pre-built binary to uv-nix ${VERSION} from release [${TAG}](https://github.com/chadac/uv-nix/releases/tag/${TAG}).

          After merge, users can install with:
          \`\`\`bash
          nix profile install github:chadac/uv-nix#bin
          \`\`\`

          Generated automatically by the update-binary-registry workflow.
          EOF
          )"
        env:
          GH_TOKEN: ${{ github.token }}
