name: Compatibility Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Test scope'
        required: false
        default: 'core'
        type: choice
        options:
          - core
          - all
      platforms:
        description: 'Platforms to test'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - ubuntu-only
          - macos-only
      commit_sha:
        description: 'PR commit SHA to report check status to (leave empty for manual runs)'
        required: false
        type: string

permissions:
  pull-requests: write
  checks: write
  statuses: write

jobs:
  # When triggered via workflow_dispatch with a commit_sha, create a check run
  # on the PR so the status is visible before tests finish.
  create-check:
    if: inputs.commit_sha != ''
    runs-on: ubuntu-latest
    steps:
      - name: Create in-progress check run
        run: |
          gh api repos/${{ github.repository }}/check-runs \
            -f name="Compatibility Tests" \
            -f head_sha="${{ inputs.commit_sha }}" \
            -f status="in_progress" \
            -f "output[title]=Compatibility Tests" \
            -f "output[summary]=Tests are running on the upgrade branch." \
            -f "details_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GH_TOKEN: ${{ github.token }}

  test-ubuntu:
    if: >-
      github.event_name != 'workflow_dispatch' ||
      inputs.platforms == '' ||
      inputs.platforms == 'all' ||
      inputs.platforms == 'ubuntu-only'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - name: Prepare workspace for cache
        run: mkdir -p uv/target

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "uv -> target"

      - name: Build patched uv
        run: nix develop --command just build

      - name: Run core tests
        if: github.event_name != 'workflow_dispatch' || inputs.test_scope == 'core' || inputs.test_scope == ''
        run: nix develop --command just test

      - name: Run all tests
        if: github.event_name == 'workflow_dispatch' && inputs.test_scope == 'all'
        run: nix develop --command just test-all

  test-macos:
    if: >-
      github.event_name != 'workflow_dispatch' ||
      inputs.platforms == '' ||
      inputs.platforms == 'all' ||
      inputs.platforms == 'macos-only'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - name: Prepare workspace for cache
        run: mkdir -p uv/target

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "uv -> target"

      - name: Build patched uv
        run: nix develop --command just build

      - name: Run core tests
        if: github.event_name != 'workflow_dispatch' || inputs.test_scope == 'core' || inputs.test_scope == ''
        run: nix develop --command just test

      - name: Run all tests
        if: github.event_name == 'workflow_dispatch' && inputs.test_scope == 'all'
        run: nix develop --command just test-all

  bench-ubuntu:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - name: Prepare workspace for cache
        run: mkdir -p uv/target

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "uv -> target"

      - name: Build patched uv
        run: nix develop --command just build

      - name: Run benchmarks
        run: |
          nix develop --command bash -c '
            BENCH_OUTPUT=/tmp/bench-ubuntu.md just bench
          '

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bench-ubuntu
          path: /tmp/bench-ubuntu.md

  bench-macos:
    if: github.event_name == 'pull_request'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - name: Prepare workspace for cache
        run: mkdir -p uv/target

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "uv -> target"

      - name: Build patched uv
        run: nix develop --command just build

      - name: Run benchmarks
        run: |
          nix develop --command bash -c '
            BENCH_OUTPUT=/tmp/bench-macos.md just bench
          '

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bench-macos
          path: /tmp/bench-macos.md

  bench-report:
    if: github.event_name == 'pull_request'
    needs: [bench-ubuntu, bench-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download ubuntu results
        uses: actions/download-artifact@v4
        with:
          name: bench-ubuntu
          path: /tmp/bench

      - name: Download macos results
        uses: actions/download-artifact@v4
        with:
          name: bench-macos
          path: /tmp/bench

      - name: Build comment body
        id: body
        run: |
          {
            echo "## Install Benchmarks"
            echo ""
            echo "### Ubuntu (x86_64-linux)"
            echo ""
            cat /tmp/bench/bench-ubuntu.md
            echo ""
            echo "### macOS (aarch64-darwin)"
            echo ""
            cat /tmp/bench/bench-macos.md
            echo ""
            echo "_Generated by CI run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_"
          } > /tmp/comment-body.md
          cat /tmp/comment-body.md

      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: find
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '## Install Benchmarks'

      - name: Post or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: /tmp/comment-body.md
          edit-mode: replace

  # Report check status back to the PR commit when triggered by check-uv-release.
  report-check:
    if: always() && inputs.commit_sha != ''
    needs: [test-ubuntu, test-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Determine result
        id: result
        run: |
          if [ "${{ needs.test-ubuntu.result }}" = "success" ] && [ "${{ needs.test-macos.result }}" = "success" ]; then
            echo "conclusion=success" >> $GITHUB_OUTPUT
            echo "summary=All compatibility tests passed." >> $GITHUB_OUTPUT
          else
            echo "conclusion=failure" >> $GITHUB_OUTPUT
            echo "summary=Some tests failed. Ubuntu: ${{ needs.test-ubuntu.result }}, macOS: ${{ needs.test-macos.result }}" >> $GITHUB_OUTPUT
          fi

      - name: Update check run
        run: |
          # Find the check run we created earlier
          CHECK_RUN_ID=$(gh api "repos/${{ github.repository }}/commits/${{ inputs.commit_sha }}/check-runs" \
            --jq '.check_runs[] | select(.name == "Compatibility Tests") | .id' | head -1)

          if [ -n "$CHECK_RUN_ID" ]; then
            gh api "repos/${{ github.repository }}/check-runs/${CHECK_RUN_ID}" \
              -X PATCH \
              -f status="completed" \
              -f conclusion="${{ steps.result.outputs.conclusion }}" \
              -f "output[title]=Compatibility Tests" \
              -f "output[summary]=${{ steps.result.outputs.summary }}" \
              -f "details_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            # Fallback: create a new completed check run
            gh api "repos/${{ github.repository }}/check-runs" \
              -f name="Compatibility Tests" \
              -f head_sha="${{ inputs.commit_sha }}" \
              -f status="completed" \
              -f conclusion="${{ steps.result.outputs.conclusion }}" \
              -f "output[title]=Compatibility Tests" \
              -f "output[summary]=${{ steps.result.outputs.summary }}" \
              -f "details_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
