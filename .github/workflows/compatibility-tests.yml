name: Compatibility Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Test scope'
        required: true
        default: 'core'
        type: choice
        options:
          - core
          - all
      platforms:
        description: 'Platforms to test'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ubuntu-only
          - macos-only

jobs:
  test-ubuntu:
    if: >-
      github.event_name != 'workflow_dispatch' ||
      inputs.platforms == 'all' ||
      inputs.platforms == 'ubuntu-only'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - name: Prepare workspace
        run: mkdir -p uv

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "uv -> target"

      - name: Build patched uv
        run: nix develop --command just build

      - name: Run core tests
        if: github.event_name != 'workflow_dispatch' || inputs.test_scope == 'core'
        run: nix develop --command just test

      - name: Run all tests
        if: github.event_name == 'workflow_dispatch' && inputs.test_scope == 'all'
        run: nix develop --command just test-all

  test-macos:
    if: >-
      github.event_name != 'workflow_dispatch' ||
      inputs.platforms == 'all' ||
      inputs.platforms == 'macos-only'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - name: Prepare workspace
        run: mkdir -p uv

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "uv -> target"

      - name: Build patched uv
        run: nix develop --command just build

      - name: Run core tests
        if: github.event_name != 'workflow_dispatch' || inputs.test_scope == 'core'
        run: nix develop --command just test

      - name: Run all tests
        if: github.event_name == 'workflow_dispatch' && inputs.test_scope == 'all'
        run: nix develop --command just test-all
