name: Compatibility Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Test scope'
        required: true
        default: 'core'
        type: choice
        options:
          - core
          - all
      platforms:
        description: 'Platforms to test'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ubuntu-only
          - macos-only

permissions:
  pull-requests: write

jobs:
  test-ubuntu:
    if: >-
      github.event_name != 'workflow_dispatch' ||
      inputs.platforms == 'all' ||
      inputs.platforms == 'ubuntu-only'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - name: Prepare workspace for cache
        run: mkdir -p uv/target

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "uv -> target"

      - name: Build patched uv
        run: nix develop --command just build

      - name: Run core tests
        if: github.event_name != 'workflow_dispatch' || inputs.test_scope == 'core'
        run: nix develop --command just test

      - name: Run all tests
        if: github.event_name == 'workflow_dispatch' && inputs.test_scope == 'all'
        run: nix develop --command just test-all

  test-macos:
    if: >-
      github.event_name != 'workflow_dispatch' ||
      inputs.platforms == 'all' ||
      inputs.platforms == 'macos-only'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - name: Prepare workspace for cache
        run: mkdir -p uv/target

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "uv -> target"

      - name: Build patched uv
        run: nix develop --command just build

      - name: Run core tests
        if: github.event_name != 'workflow_dispatch' || inputs.test_scope == 'core'
        run: nix develop --command just test

      - name: Run all tests
        if: github.event_name == 'workflow_dispatch' && inputs.test_scope == 'all'
        run: nix develop --command just test-all

  bench-ubuntu:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - name: Prepare workspace for cache
        run: mkdir -p uv/target

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "uv -> target"

      - name: Build patched uv
        run: nix develop --command just build

      - name: Run benchmarks
        run: |
          nix develop --command bash -c '
            BENCH_OUTPUT=/tmp/bench-ubuntu.md just bench
          '

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bench-ubuntu
          path: /tmp/bench-ubuntu.md

  bench-macos:
    if: github.event_name == 'pull_request'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - name: Prepare workspace for cache
        run: mkdir -p uv/target

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "uv -> target"

      - name: Build patched uv
        run: nix develop --command just build

      - name: Run benchmarks
        run: |
          nix develop --command bash -c '
            BENCH_OUTPUT=/tmp/bench-macos.md just bench
          '

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bench-macos
          path: /tmp/bench-macos.md

  bench-report:
    if: github.event_name == 'pull_request'
    needs: [bench-ubuntu, bench-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download ubuntu results
        uses: actions/download-artifact@v4
        with:
          name: bench-ubuntu
          path: /tmp/bench

      - name: Download macos results
        uses: actions/download-artifact@v4
        with:
          name: bench-macos
          path: /tmp/bench

      - name: Build comment body
        id: body
        run: |
          {
            echo "## Install Benchmarks"
            echo ""
            echo "### Ubuntu (x86_64-linux)"
            echo ""
            cat /tmp/bench/bench-ubuntu.md
            echo ""
            echo "### macOS (aarch64-darwin)"
            echo ""
            cat /tmp/bench/bench-macos.md
            echo ""
            echo "_Generated by CI run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_"
          } > /tmp/comment-body.md
          cat /tmp/comment-body.md

      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: find
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '## Install Benchmarks'

      - name: Post or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: /tmp/comment-body.md
          edit-mode: replace
