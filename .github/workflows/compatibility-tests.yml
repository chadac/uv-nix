name: Compatibility Tests

on:
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Test scope'
        required: true
        default: 'core'
        type: choice
        options:
          - core
          - all
      platforms:
        description: 'Platforms to test'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ubuntu-only
          - macos-only

jobs:
  test-ubuntu:
    if: ${{ inputs.platforms == 'all' || inputs.platforms == 'ubuntu-only' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v15
        with:
          name: uv-nix
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        continue-on-error: true

      - name: Build patched uv
        run: nix develop --command just build

      - name: Run core tests
        if: ${{ inputs.test_scope == 'core' }}
        run: nix develop --command just test

      - name: Run all tests
        if: ${{ inputs.test_scope == 'all' }}
        run: nix develop --command just test-all

  test-macos:
    if: ${{ inputs.platforms == 'all' || inputs.platforms == 'macos-only' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v15
        with:
          name: uv-nix
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        continue-on-error: true

      - name: Build patched uv
        run: nix develop --command just build

      - name: Run core tests
        if: ${{ inputs.test_scope == 'core' }}
        run: nix develop --command just test

      - name: Run all tests
        if: ${{ inputs.test_scope == 'all' }}
        run: nix develop --command just test-all
